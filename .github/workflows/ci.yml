name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install CGO dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc libc6-dev libsqlite3-dev libolm-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build -trimpath ./...

      - name: Test
        run: go test ./...

  docker:
    needs: build
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Image name, build metadata, and push tags
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          echo "BUILDTIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tags=${IMAGE}:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            SHORT="${GITHUB_SHA:0:7}"
            BRANCH="${GITHUB_REF_NAME}"
            SAFE=$(echo "$BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | cut -c1-100)
            # Commit-pinned tag for reproducible test deploys; branch tag moves with latest push on that branch
            echo "tags=${IMAGE}:sha-${SHORT},${IMAGE}:branch-${SAFE}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILDTIME=${{ env.BUILDTIME }}
